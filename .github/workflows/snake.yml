name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Se ejecuta una vez al día a medianoche
  workflow_dispatch: # Permite ejecutar el workflow manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: EsdrasMujica # ¡IMPORTANTE! Reemplaza con tu nombre de usuario de GitHub
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=orange&color_dots=#bfd6ff,#f8c3e0,#e4b6e8,#d9a6ed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: output # La rama donde se guardará el SVG generado
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
